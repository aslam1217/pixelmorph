    <style>
        /* ═══════════════════════════════════════════
           DESIGN TOKENS
        ═══════════════════════════════════════════ */
        :root {
            --bg:           #F0FDFB;
            --surface:      #FFFFFF;
            --surface-2:    #F7FFFD;
            --border:       #CCFBF1;
            --border-2:     #99F6E4;
            --brand:        #0f766e;

            --border:       #1E3450;

            --shadow-md:    0 4px 20px rgba(20,184,166,.18), 0 8px 32px rgba(0,0,0,.45);

        /* ═══════════════════════════════════════════

        *, *::before, *::after { box-sizing: border-box; }

        /* ═══════════════════════════════════════════
           FAQ
        ═══════════════════════════════════════════ */
        .faq-block {
            background: var(--surface); border: 1.5px solid var(--border);
            border-radius: var(--r); overflow: hidden;
            margin-bottom: 40px; box-shadow: var(--shadow-sm);

        .faq-hdr { padding: 18px 26px; border-bottom: 1.5px solid var(--border); font-size: .9375rem; font-weight: 700; color: var(--text); }
        .faq-item { border-top: 1px solid var(--border); }

        .faq-item[open] .faq-chev { transform: rotate(180deg); }
        .faq-item p { padding: 0 26px 16px; font-size: .875rem; color: var(--muted); line-height: 1.65; }

        /* ═══════════════════════════════════════════
           UPLOAD VIEW
        ═══════════════════════════════════════════ */
        .upload-wrap { max-width: 680px; margin: 0 auto; padding-top: 40px; }

        .back-btn {
            display: inline-flex; align-items: center; gap: 6px;
            background: none; border: none; cursor: pointer;
            color: var(--brand); font-family: inherit; font-size: .875rem; font-weight: 700;
            padding: 4px 0; margin-bottom: 22px; transition: opacity var(--ease);
        }
        .back-btn:hover { opacity: .7; }
        .back-btn:focus-visible { outline: 2px solid var(--brand); outline-offset: 4px; border-radius: 4px; }

        .upload-card {
            background: var(--surface); border: 1.5px solid var(--border);
            border-radius: var(--r); box-shadow: var(--shadow-sm); overflow: hidden;

        .upload-card-hdr {
            padding: 28px 32px 22px; border-bottom: 1.5px solid var(--border);

            letter-spacing: -.025em; margin-bottom: 6px;

        /* Drop Zone */
        #drop-zone {
            margin: 24px; border: 2px dashed var(--border-2);
            border-radius: 12px; min-height: 260px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; padding: 44px 28px;
            transition: background var(--ease), border-color var(--ease);
            animation: dz-pulse 3.5s ease-in-out infinite;
        }
        @keyframes dz-pulse {
            0%, 100% { border-color: var(--border-2); }
            50% { border-color: var(--brand); }
        }
        #drop-zone:hover, #drop-zone.drag-over {
            border-color: var(--brand); background: var(--brand-xlight);
            animation: none;
        }
        #drop-zone:focus-visible { outline: 2.5px solid var(--brand); outline-offset: 4px; animation: none; }

        .dz-circle {
            width: 72px; height: 72px; border-radius: 50%;
            background: var(--brand); display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px; box-shadow: 0 4px 20px rgba(15,118,110,.32);
            transition: transform var(--ease), box-shadow var(--ease);
        }
        #drop-zone:hover .dz-circle, #drop-zone.drag-over .dz-circle {
            transform: scale(1.1); box-shadow: 0 8px 28px rgba(15,118,110,.48);

        .dz-title { font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 6px; text-align: center; }

        .ws-left { display: flex; align-items: center; gap: 14px; }
        .ws-tname {
            font-size: .65rem; font-weight: 800; letter-spacing: .1em;

        .ws-tdesc { font-size: .8rem; color: var(--muted); }
        .ws-acts { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }

        .sp { padding: 14px 22px; border-bottom: 1.5px solid var(--border); }
        .sp-label {

        .sp-row { display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-end; }

        #sortable-grid {

            transition: border-color var(--ease);
